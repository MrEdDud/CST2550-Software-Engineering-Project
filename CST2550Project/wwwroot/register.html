<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page register-page">
    <div class="auth-container">
        <div class="auth-brand">
            <div class="brand-content">
                <div class="brand-logo">
                    <i class="fas fa-heart"></i>
                </div>
                <h1>Zelove</h1>
                <p>Join thousands of singles finding love and meaningful connections every day. (18+)</p>
                <div class="brand-stats">
                    <div class="stat">
                        <span class="stat-number">Since 2026</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">Secure</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">Verified</span>
                    </div>
                </div>
            </div>
            <div class="brand-decoration">
                <div class="floating-heart" style="--delay: 0s; --x: 20%;"></div>
                <div class="floating-heart" style="--delay: 1s; --x: 60%;"></div>
                <div class="floating-heart" style="--delay: 2s; --x: 80%;"></div>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Start your journey to find love on Zelove</p>
                </div>

                <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-username"><i class="fas fa-user"></i> Username</label>
                        <input type="text" id="reg-username" name="username" placeholder="Choose a unique username" required minlength="3" maxlength="50">
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-password"><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input">
                            <input type="password" id="reg-password" name="password" placeholder="Create a strong password" required minlength="6">
                            <button type="button" class="toggle-password" onclick="togglePassword('reg-password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar"></div>
                            <span class="strength-text"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="name"><i class="fas fa-id-card"></i> Your Name</label>
                        <input type="text" id="name" name="name" placeholder="What should we call you?" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="age"><i class="fas fa-birthday-cake"></i> Age</label>
                            <input type="number" id="age" name="age" placeholder="Your age" required min="18" max="120">
                        </div>
                        <div class="form-group">
                            <label for="gender"><i class="fas fa-venus-mars"></i> Gender</label>
                            <select id="gender" name="gender" required>
                                <option value="">Select...</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-error hidden" id="registerError">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="registerErrorText"></span>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                            <span>Create Account</span>
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="data/localdb.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

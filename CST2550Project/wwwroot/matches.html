<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches - Zelove</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <i class="fas fa-heart"></i>
            <span>Zelove</span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="index.html" class="nav-link"><i class="fas fa-compass"></i> Discover</a>
            <a href="matches.html" class="nav-link active"><i class="fas fa-heart"></i> Matches <span class="badge" id="matchBadge"></span></a>
            <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a>
            <a href="#" class="nav-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
        <div class="nav-toggle" onclick="toggleNav()">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <main class="main-content">
        <div class="matches-page">
            <aside class="matches-sidebar">
                <div class="sidebar-header">
                    <h2><i class="fas fa-heart"></i> Your Matches</h2>
                </div>
                <div class="matches-list" id="matchesList">
                    <div class="loading-matches">
                        <div class="loader"></div>
                        <p>Loading matches...</p>
                    </div>
                </div>
                <div class="no-matches hidden" id="noMatches">
                    <i class="fas fa-heart-broken"></i>
                    <p>No matches yet</p>
                    <a href="index.html" class="btn btn-primary btn-sm">Start Swiping</a>
                </div>
            </aside>

            <div class="chat-area" id="chatArea">
                <div class="chat-placeholder" id="chatPlaceholder">
                    <div class="placeholder-content">
                        <i class="fas fa-comments"></i>
                        <h3>Select a match to start chatting</h3>
                        <p>Your conversations will appear here</p>
                    </div>
                </div>

                <div class="chat-container hidden" id="chatContainer">
                    <div class="chat-header" id="chatHeader">
                        <div class="chat-user-info">
                            <img src="" alt="" class="chat-avatar" id="chatAvatar">
                            <div class="chat-user-details">
                                <h3 id="chatUserName">Name</h3>
                                <span class="chat-status" id="chatStatus">Online</span>
                            </div>
                        </div>
                        <div class="chat-actions">
                            <button class="icon-btn" onclick="viewProfile()">
                                <i class="fas fa-user"></i>
                            </button>
                            <button class="icon-btn danger" onclick="handleUnmatch()">
                                <i class="fas fa-user-times"></i>
                            </button>
                        </div>
                    </div>

                    <div class="chat-messages" id="chatMessages">
                    </div>

                    <div class="chat-input-area">
                        <form onsubmit="handleSendMessage(event)" class="message-form">
                            <div class="message-input-wrapper">
                                <button type="button" class="emoji-btn">
                                    <i class="fas fa-smile"></i>
                                </button>
                                <input 
                                    type="text" 
                                    id="messageInput" 
                                    placeholder="Type a message..."
                                    autocomplete="off"
                                >
                                <button type="submit" class="send-btn">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/matches.js"></script>
</body>
</html>

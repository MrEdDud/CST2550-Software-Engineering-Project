<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zelove</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <div class="brand-content">
                <div class="brand-logo">
                    <i class="fas fa-heart"></i>
                </div>
                <h1>Zelove</h1>
                <p>Find meaningful connections with people who share your interests and values. (18+)</p>
                <div class="brand-features">
                    <div class="feature">
                        <i class="fas fa-shield-alt"></i>
                        <span>Safe & Secure</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-users"></i>
                        <span>Verified Profiles</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-heart"></i>
                        <span>Real Connections</span>
                    </div>
                </div>
            </div>
            <div class="brand-decoration">
                <div class="floating-heart" style="--delay: 0s; --x: 20%;"></div>
                <div class="floating-heart" style="--delay: 1s; --x: 60%;"></div>
                <div class="floating-heart" style="--delay: 2s; --x: 80%;"></div>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue to Zelove</p>
                </div>

                <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i>
                            Username
                        </label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-input">
                            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-error hidden" id="loginError">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="loginErrorText"></span>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Sign Up</a></p>
                </div>

                <div class="demo-hint">
                    <p><strong>Demo Account:</strong></p>
                    <p>Username: <code>alex_adventure</code></p>
                    <p>Password: <code>Password123!</code></p>
                    <div style="margin-top:8px;">
                        <button id="demoBtn" class="btn btn-outline" type="button">Use Demo Account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

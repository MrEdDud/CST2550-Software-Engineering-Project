<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dating App</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<header>
  <h1>❤️ MatchMe</h1>
</header>

<div class="card">
  <img src="Images/avatar.png" alt="Profile">
  <h2 id="name">Alex, 21</h2>
  <p id="bio">Loves travel and coffee ☕</p>

  <div class="buttons">
    <button class="no" onclick="nextProfile()">❌</button>
    <button class="yes" onclick="nextProfile()">❤️</button>
  </div>
</div>

<script src="JS/app.js"></script>
</body>
</html>
